<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الامتياز | Imtiyaz Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="auth-nav">
        <button onclick="toggleAuthModal()" class="auth-trigger">تسجيل الدخول</button>
    </div>

    <header class="hero">
        <div class="glass-container main-card">
            <h1 class="logo-title">مكتبة الامتياز</h1>
            <div class="typing-box">
                <span id="typed-text"></span><span class="cursor">|</span>
            </div>
            <a href="https://wa.me/21652206325" class="cta-button">
                <i class="fab fa-whatsapp"></i> تواصل معنا
            </a>
        </div>
    </header>

    <div id="auth-modal" class="modal">
        <div class="glass-container modal-content">
            <span class="close-btn" onclick="toggleAuthModal()">&times;</span>
            
            <div id="login-form">
                <h2>تسجيل الدخول</h2>
                <input type="email" placeholder="البريد الإلكتروني" class="input-field">
                <input type="password" placeholder="كلمة السر" class="input-field">
                <button onclick="handleLogin()" class="cta-button">دخول</button>
                <p>ليس لديك حساب؟ <a href="#" onclick="switchForm('register')">إنشاء حساب جديد</a></p>
            </div>

            <div id="register-form" style="display:none;">
                <h2>إنشاء حساب جديد</h2>
                <input type="text" placeholder="الاسم الكامل" class="input-field">
                <input type="email" placeholder="البريد الإلكتروني" class="input-field">
                <input type="password" placeholder="كلمة السر" class="input-field">
                <button onclick="handleRegister()" class="cta-button">تسجيل</button>
                <p>لديك حساب فعلاً؟ <a href="#" onclick="switchForm('login')">دخول</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
