<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الامتياز | Imtiyaz Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">

    <div id="toast-container"></div>

    <button onclick="toggleTheme()" class="theme-toggle">
        <i id="theme-icon" class="fas fa-sun"></i>
    </button>

    <section id="landing-page" class="hero">
        <div class="auth-nav">
            <button onclick="toggleAuthModal()" class="auth-trigger">دخول / تسجيل</button>
        </div>
        <div class="glass-container main-card">
            <h1 class="logo-title">مكتبة الامتياز</h1>
            <div id="typed-text" class="typing-text"></div>
        </div>
    </section>

    <section id="verify-page" style="display: none;" class="full-screen-center">
        <div class="glass-container text-center">
            <i class="fas fa-envelope-open-text verify-icon"></i>
            <h2>أكد حسابك 📧</h2>
            <p>يرجى تفقد بريدك الإلكتروني والضغط على رابط التفعيل للدخول.</p>
            <button onclick="window.location.reload()" class="cta-button">تأكدت، أدخلني</button>
            <button onclick="handleLogout()" class="secondary-btn">تسجيل الخروج</button>
        </div>
    </section>

    <section id="dashboard" style="display: none;">
        <nav class="top-nav">
            <div class="user-profile" onclick="showProfile()">
                <img src="https://ui-avatars.com/api/?background=00d2ff&color=fff" id="user-avatar" class="avatar">
                <span id="user-display-name"></span>
            </div>
            <div class="nav-links">
                <button onclick="switchTab('market')" class="tab-btn active">المتجر</button>
                <button onclick="switchTab('pdf')" class="tab-btn">المكتبة</button>
                <button onclick="switchTab('map')" class="tab-btn">موقعنا</button>
                <button onclick="handleLogout()" class="logout-link"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div id="market-section" class="tab-content">
            <div class="header-flex">
                <h2>المتجر الذكي 🛒</h2>
                <button id="wa-btn" onclick="sendOrder()" class="whatsapp-send disabled">
                    إرسال الطلب عبر واتساب (<span id="cart-count">0</span>)
                </button>
            </div>
            <div class="product-grid" id="market-grid"></div>
        </div>

        <div id="pdf-section" class="tab-content" style="display: none;">
            <h2>المكتبة الرقمية 📚</h2>
            <div class="pdf-grid" id="pdf-grid"></div>
        </div>

        <div id="map-section" class="tab-content" style="display: none;">
            <h2>موقعنا في العامرة 📍</h2>
            <div class="map-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1000!2d10.896!3d34.987!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sar!2stn!4v1700000000000" width="100%" height="450" style="border:0; border-radius:15px;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <div id="auth-modal" class="modal">
        <div class="glass-container modal-content">
            <span class="close" onclick="toggleAuthModal()">&times;</span>
            <div id="login-box">
                <h3>تسجيل الدخول</h3>
                <input type="email" id="email-log" placeholder="البريد الإلكتروني" class="input-style">
                <input type="password" id="pass-log" placeholder="كلمة السر" class="input-style">
                <button onclick="handleLogin()" class="btn-main">دخول</button>
                <p onclick="toggleAuthType('reg')">ليس لديك حساب؟ سجل هنا</p>
            </div>
            <div id="reg-box" style="display: none;">
                <h3>إنشاء حساب جديد</h3>
                <input type="email" id="email-reg" placeholder="البريد الإلكتروني" class="input-style">
                <input type="password" id="pass-reg" placeholder="كلمة السر (6+ رموز)" class="input-style">
                <button onclick="handleRegister()" class="btn-main">تسجيل</button>
                <p onclick="toggleAuthType('log')">عندك حساب؟ ادخل هنا</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
